<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CV ATS Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

    :root {
      --bg: #f6f3ee;
      --ink: #17212b;
      --muted: #55606d;
      --card: #ffffff;
      --border: #d8d0c7;
      --primary: #0f7c8a;
      --primary-dark: #0a5d67;
      --accent: #e76f51;
      --ok: #2a9d8f;
      --warn: #d97706;
      --radius: 16px;
      --shadow: 0 14px 36px rgba(23, 33, 43, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: 'IBM Plex Sans', Arial, sans-serif;
      background:
        radial-gradient(circle at 0% 0%, #f1dfc9 0%, transparent 35%),
        radial-gradient(circle at 100% 20%, #d2e8ec 0%, transparent 40%),
        var(--bg);
      min-height: 100vh;
    }

    .container {
      width: min(1200px, 100% - 32px);
      margin: 24px auto 40px;
      display: grid;
      gap: 18px;
    }

    .hero {
      background: linear-gradient(135deg, #1f2937 0%, #2d3b4f 45%, #0f7c8a 100%);
      color: #fff;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 22px 60px rgba(15, 124, 138, 0.25);
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -40px;
      top: -40px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.14);
      filter: blur(2px);
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      margin: 0;
      font-size: clamp(1.8rem, 2.6vw, 2.8rem);
      line-height: 1.1;
      letter-spacing: 0.3px;
    }

    .hero p {
      margin: 10px 0 0;
      max-width: 760px;
      color: #e8f5f7;
      line-height: 1.6;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
      align-items: center;
    }

    .filename {
      min-width: 200px;
      max-width: 260px;
      border: 1px solid rgba(255,255,255,.35);
      background: rgba(255,255,255,.14);
      color: #fff;
      border-radius: 10px;
      padding: 10px 12px;
      outline: none;
    }

    .filename::placeholder { color: #d8eef1; }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
      font-family: inherit;
      transition: transform .15s ease, filter .2s ease;
    }

    .btn:hover { transform: translateY(-1px); filter: brightness(1.03); }
    .btn:active { transform: translateY(0); }

    .btn-primary { background: var(--primary); color: #fff; }
    .btn-secondary { background: #fff; color: #1f2937; }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-ok { background: var(--ok); color: #fff; }

    .layout {
      display: grid;
      grid-template-columns: 1.2fr 0.9fr;
      gap: 18px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .card h2 {
      margin: 2px 0 14px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.25rem;
    }

    .stack { display: grid; gap: 12px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    label {
      font-size: .9rem;
      color: var(--muted);
      display: block;
      margin-bottom: 5px;
    }

    input, textarea {
      width: 100%;
      border: 1px solid #cfc4b8;
      background: #fff;
      border-radius: 10px;
      font-family: inherit;
      font-size: .96rem;
      color: var(--ink);
      padding: 10px 12px;
      outline: none;
    }

    textarea { min-height: 88px; resize: vertical; }
    input:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(15, 124, 138, 0.15); }

    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      margin: 8px 0 2px;
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .list-item {
      border: 1px dashed #cfc4b8;
      border-radius: 10px;
      padding: 10px;
      background: #fffaf3;
      font-size: .92rem;
      line-height: 1.45;
    }

    .preview {
      white-space: pre-wrap;
      line-height: 1.5;
      max-height: 620px;
      overflow: auto;
      background: #fff;
      border: 1px solid #cfc4b8;
      border-radius: 12px;
      padding: 14px;
      font-size: .92rem;
    }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      background: #17212b;
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      box-shadow: 0 12px 30px rgba(23, 33, 43, .25);
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: all .22s ease;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .grid2 { grid-template-columns: 1fr; }
      .toolbar { gap: 8px; }
      .filename { max-width: none; width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>CV ATS Dashboard</h1>
      <p>Buat CV ATS-friendly, ringkas pengalaman kerja dengan Gemini, optimalkan konten, dan simpan ke TXT, JSON, serta PDF standar ATS.</p>
      <div class="toolbar">
        <input id="filename" class="filename" placeholder="Nama file output, contoh: cv_andi" value="my_cv_ats" />
        <button class="btn btn-secondary" id="btnSample">Load Sample</button>
        <button class="btn btn-secondary" id="btnNew">New CV</button>
        <button class="btn btn-primary" id="btnOptimize">Optimize ATS</button>
        <button class="btn btn-ok" id="btnSaveAll">Save TXT + JSON + PDF</button>
        <button class="btn btn-accent" id="btnPdf">Download PDF</button>
      </div>
    </section>

    <section class="layout">
      <div class="card stack">
        <h2>Input Data CV</h2>

        <div>
          <div class="section-title">Personal Info</div>
          <div class="grid2">
            <div><label>Nama lengkap</label><input id="full_name"></div>
            <div><label>Email</label><input id="email"></div>
            <div><label>Phone</label><input id="phone"></div>
            <div><label>Lokasi</label><input id="location"></div>
            <div><label>LinkedIn</label><input id="linkedin"></div>
            <div><label>Website</label><input id="website"></div>
          </div>
        </div>

        <div>
          <div class="section-title">Professional Summary</div>
          <textarea id="summary" placeholder="Ringkasan profesional..."></textarea>
        </div>

        <div>
          <div class="section-title">Experience</div>
          <div class="grid2">
            <div><label>Job Title</label><input id="exp_job"></div>
            <div><label>Company</label><input id="exp_company"></div>
            <div><label>Start Date</label><input id="exp_start" placeholder="Jan 2022"></div>
            <div><label>End Date</label><input id="exp_end" placeholder="Present"></div>
          </div>
          <label>Deskripsi</label>
          <textarea id="exp_desc" placeholder="Deskripsi pengalaman..."></textarea>
          <div class="toolbar">
            <button class="btn btn-secondary" id="btnSummarizeExp">Summarize Description</button>
            <button class="btn btn-primary" id="btnAddExp">Add Experience</button>
          </div>
          <div id="exp_list" class="list"></div>
        </div>

        <div>
          <div class="section-title">Education</div>
          <div class="grid2">
            <div><label>Degree</label><input id="edu_degree"></div>
            <div><label>Institution</label><input id="edu_inst"></div>
            <div><label>Field</label><input id="edu_field"></div>
            <div><label>Graduation Year</label><input id="edu_year"></div>
          </div>
          <div class="toolbar">
            <button class="btn btn-primary" id="btnAddEdu">Add Education</button>
          </div>
          <div id="edu_list" class="list"></div>
        </div>

        <div>
          <div class="section-title">Skills (pisahkan dengan koma)</div>
          <input id="skills" placeholder="Python, Flask, SQL, Docker">
        </div>
      </div>

      <div class="card stack">
        <h2>Preview CV</h2>
        <div class="toolbar">
          <button class="btn btn-secondary" id="btnSync">Sync ke Server</button>
          <button class="btn btn-secondary" id="btnPreview">Refresh Preview</button>
        </div>
        <div id="preview" class="preview">Belum ada data preview.</div>
      </div>
    </section>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const state = {
      experience: [],
      education: []
    };

    const q = (id) => document.getElementById(id);

    const showToast = (message, timeout = 2000) => {
      const t = q('toast');
      t.textContent = message;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), timeout);
    };

    const sanitizeFileName = (name) => {
      const cleaned = (name || 'my_cv_ats').trim().replace(/[^a-zA-Z0-9_-]+/g, '_');
      return cleaned || 'my_cv_ats';
    };

    const collectPersonal = () => ({
      full_name: q('full_name').value.trim(),
      email: q('email').value.trim(),
      phone: q('phone').value.trim(),
      location: q('location').value.trim(),
      linkedin: q('linkedin').value.trim(),
      website: q('website').value.trim()
    });

    const renderList = (targetId, items, formatter) => {
      const el = q(targetId);
      if (!items.length) {
        el.innerHTML = '';
        return;
      }
      el.innerHTML = items.map((item, idx) => `<div class="list-item"><strong>#${idx + 1}</strong><br>${formatter(item)}</div>`).join('');
    };

    const renderStateLists = () => {
      renderList('exp_list', state.experience, (x) => `${x.job_title} - ${x.company}<br>${x.start_date} - ${x.end_date}<br>${x.description}`);
      renderList('edu_list', state.education, (x) => `${x.degree} in ${x.field}<br>${x.institution} (${x.graduation_year})`);
    };

    const postJson = async (url, payload = {}) => {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        let msg = `Request gagal: ${res.status}`;
        try {
          const data = await res.json();
          msg = data.error || data.message || msg;
        } catch (_) {}
        throw new Error(msg);
      }

      const contentType = res.headers.get('content-type') || '';
      if (contentType.includes('application/json')) {
        return res.json();
      }
      return res;
    };

    const syncCvToServer = async () => {
      await postJson('/api/cv/new');
      await postJson('/api/cv/personal-info', collectPersonal());
      await postJson('/api/cv/summary', { summary: q('summary').value.trim() });
      await postJson('/api/cv/skills', { skills: q('skills').value.trim() });

      for (const exp of state.experience) {
        await postJson('/api/cv/experience', exp);
      }

      for (const edu of state.education) {
        await postJson('/api/cv/education', edu);
      }
    };

    const refreshPreview = async () => {
      const data = await fetch('/api/cv/preview').then(r => r.json());
      const lines = [];
      const p = data.personal_info || {};

      lines.push((p.full_name || '').toUpperCase());
      if (p.email) lines.push(`Email: ${p.email}`);
      if (p.phone) lines.push(`Phone: ${p.phone}`);
      if (p.location) lines.push(`Location: ${p.location}`);
      if (p.linkedin) lines.push(`LinkedIn: ${p.linkedin}`);
      if (p.website) lines.push(`Website: ${p.website}`);

      if (data.professional_summary) {
        lines.push('\nPROFESSIONAL SUMMARY');
        lines.push(data.professional_summary);
      }

      if ((data.experience || []).length) {
        lines.push('\nEXPERIENCE');
        data.experience.forEach((exp) => {
          lines.push(`\n${exp.job_title} at ${exp.company}`);
          lines.push(`${exp.start_date} - ${exp.end_date}`);
          lines.push(exp.description);
        });
      }

      if ((data.education || []).length) {
        lines.push('\nEDUCATION');
        data.education.forEach((edu) => {
          lines.push(`\n${edu.degree} in ${edu.field}`);
          lines.push(`${edu.institution} (${edu.graduation_year})`);
        });
      }

      if ((data.skills || []).length) {
        lines.push('\nSKILLS');
        lines.push(data.skills.join(', '));
      }

      q('preview').textContent = lines.join('\n') || 'Belum ada data preview.';
    };

    q('btnAddExp').addEventListener('click', () => {
      const item = {
        job_title: q('exp_job').value.trim(),
        company: q('exp_company').value.trim(),
        start_date: q('exp_start').value.trim(),
        end_date: q('exp_end').value.trim(),
        description: q('exp_desc').value.trim()
      };

      if (!item.job_title || !item.company || !item.description) {
        showToast('Isi Job Title, Company, dan Deskripsi dulu.');
        return;
      }

      state.experience.push(item);
      q('exp_job').value = '';
      q('exp_company').value = '';
      q('exp_start').value = '';
      q('exp_end').value = '';
      q('exp_desc').value = '';
      renderStateLists();
      showToast('Experience ditambahkan.');
    });

    q('btnAddEdu').addEventListener('click', () => {
      const item = {
        degree: q('edu_degree').value.trim(),
        institution: q('edu_inst').value.trim(),
        field: q('edu_field').value.trim(),
        graduation_year: q('edu_year').value.trim()
      };

      if (!item.degree || !item.institution) {
        showToast('Isi Degree dan Institution dulu.');
        return;
      }

      state.education.push(item);
      q('edu_degree').value = '';
      q('edu_inst').value = '';
      q('edu_field').value = '';
      q('edu_year').value = '';
      renderStateLists();
      showToast('Education ditambahkan.');
    });

    q('btnSummarizeExp').addEventListener('click', async () => {
      const text = q('exp_desc').value.trim();
      if (!text) {
        showToast('Isi deskripsi experience dulu.');
        return;
      }

      try {
        const result = await postJson('/api/cv/summarize', { text });
        q('exp_desc').value = result.summary || text;
        showToast('Deskripsi berhasil dirangkum.');
      } catch (err) {
        showToast(err.message, 3000);
      }
    });

    q('btnNew').addEventListener('click', () => {
      document.querySelectorAll('input, textarea').forEach((el) => {
        if (el.id !== 'filename') el.value = '';
      });
      state.experience = [];
      state.education = [];
      renderStateLists();
      q('preview').textContent = 'Belum ada data preview.';
      showToast('Form CV direset.');
    });

    q('btnSample').addEventListener('click', async () => {
      try {
        const data = await postJson('/api/cv/sample', {});
        const p = data.personal_info || {};
        q('full_name').value = p.full_name || '';
        q('email').value = p.email || '';
        q('phone').value = p.phone || '';
        q('location').value = p.location || '';
        q('linkedin').value = p.linkedin || '';
        q('website').value = p.website || '';
        q('summary').value = data.professional_summary || '';
        q('skills').value = (data.skills || []).join(', ');
        state.experience = data.experience || [];
        state.education = data.education || [];
        renderStateLists();
        await refreshPreview();
        showToast('Sample CV dimuat.');
      } catch (err) {
        showToast(err.message, 3000);
      }
    });

    q('btnSync').addEventListener('click', async () => {
      try {
        await syncCvToServer();
        await refreshPreview();
        showToast('Data berhasil sync ke server.');
      } catch (err) {
        showToast(err.message, 3000);
      }
    });

    q('btnPreview').addEventListener('click', async () => {
      try {
        await refreshPreview();
      } catch (err) {
        showToast(err.message, 3000);
      }
    });

    q('btnOptimize').addEventListener('click', async () => {
      try {
        await syncCvToServer();
        await postJson('/api/cv/optimize', {});
        await refreshPreview();
        showToast('CV berhasil dioptimalkan untuk ATS.');
      } catch (err) {
        showToast(err.message, 3000);
      }
    });

    q('btnSaveAll').addEventListener('click', async () => {
      try {
        const filename = sanitizeFileName(q('filename').value);
        await syncCvToServer();
        await postJson('/api/cv/save', { filename });
        await refreshPreview();
        showToast(`Disimpan ke cv_output/${filename}.{txt,json,pdf}`);
      } catch (err) {
        showToast(err.message, 3000);
      }
    });

    q('btnPdf').addEventListener('click', async () => {
      try {
        const filename = sanitizeFileName(q('filename').value);
        await syncCvToServer();

        const response = await fetch('/api/cv/export/pdf', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ filename })
        });

        if (!response.ok) {
          let message = `Gagal export PDF (${response.status})`;
          try {
            const data = await response.json();
            message = data.error || data.message || message;
          } catch (_) {}
          throw new Error(message);
        }

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${filename}.pdf`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        showToast('PDF ATS berhasil diunduh.');
      } catch (err) {
        showToast(err.message, 3000);
      }
    });
  </script>
</body>
</html>
